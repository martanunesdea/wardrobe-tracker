app = "wardrobe-tracker"
primary_region = "lhr"

[build]

[env]
  PORT = "8000"
  FLASK_DEBUG = "false"
  DB_PATH = "/data/wardrobe.db"
  UPLOAD_FOLDER = "/data/uploads"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[mounts]
  source = "wardrobe_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
